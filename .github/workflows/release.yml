name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: windows }
          - { os: macos-latest,   name: macos   }
          - { os: ubuntu-latest,  name: linux   }

    steps:
      - uses: actions/checkout@v4

      # -------- Toolchain ---------------------------------------------------
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Install Ninja (Windows/macOS)
        if: runner.os != 'Linux'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC dev shell
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # -------- Build -------------------------------------------------------
      - name: Configure
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      # -------- Package -----------------------------------------------------
      - name: Stage artefacts
        shell: bash
        run: |
          set -e
          out="dist/bedridden-${{ matrix.name }}"
          mkdir -p "$out"

          art="build/Bedridden_artefacts/Release"

          # VST3 — folder bundle on every OS
          if [ -d "$art/VST3/Bedridden.vst3" ]; then
            cp -R "$art/VST3/Bedridden.vst3" "$out/"
          fi

          # Standalone
          case "${{ matrix.name }}" in
            windows)
              cp "$art/Standalone/Bedridden.exe" "$out/" || true
              ;;
            macos)
              cp -R "$art/Standalone/Bedridden.app" "$out/" || true
              ;;
            linux)
              cp "$art/Standalone/Bedridden" "$out/" || true
              ;;
          esac

          # Reusable DSP shared library + import lib (Windows only)
          mkdir -p "$out/dsp"
          case "${{ matrix.name }}" in
            windows)
              cp build/bin/BedriddenDSP.dll  "$out/dsp/" || true
              cp build/lib/BedriddenDSP.lib  "$out/dsp/" || true
              ;;
            macos)
              cp build/bin/libBedriddenDSP*.dylib "$out/dsp/" || true
              ;;
            linux)
              cp build/bin/libBedriddenDSP*.so* "$out/dsp/" || true
              ;;
          esac
          cp dsplib/BedriddenDSP.h "$out/dsp/"

          # Docs
          cp README.md LICENSE "$out/"

          ls -laR "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: bedridden-${{ matrix.name }}
          path: dist/bedridden-${{ matrix.name }}
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Publish GitHub Release (only on v* tags)
  # -----------------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip each platform bundle
        run: |
          set -e
          mkdir -p out
          cd artifacts
          for d in */ ; do
            name="${d%/}"
            (cd "$d" && zip -r "../../out/${name}-${GITHUB_REF_NAME}.zip" .)
          done
          ls -la ../out

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
